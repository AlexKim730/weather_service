<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘 날씨 검색</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, "Malgun Gothic", sans-serif;
      --text: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --surface: #ffffff;
      --bg: #f5f7fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }
    .topbar {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }
    .topbar .wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      gap: 20px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    form {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 520px;
    }
    input {
      width: 100%;
      min-width: 0;
      height: 42px;
      border: 1px solid #c9d4e5;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 15px;
      background: #ffffff;
    }
    button {
      height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      background: var(--brand);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: var(--brand-dark); }
    button:disabled { cursor: wait; opacity: 0.68; }
    main { padding: 28px 0 40px; }
    .notice {
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid #fecaca;
      border-radius: 6px;
      background: #fff1f2;
      color: #9f1239;
    }
    .summary {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) repeat(3, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 86px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .metric strong {
      display: block;
      font-size: 24px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .metric.location strong { font-size: 20px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .chart {
      display: block;
      width: 100%;
      height: auto;
    }
    .placeholder {
      padding: 42px 18px;
      color: var(--muted);
      text-align: center;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 14px;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid #edf1f7;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #f8fafc;
      color: #475467;
      font-weight: 700;
    }
    tr:last-child td { border-bottom: 0; }
    @media (max-width: 760px) {
      .topbar .wrap {
        align-items: stretch;
        flex-direction: column;
        padding: 16px 0;
      }
      form { max-width: none; }
      .summary { grid-template-columns: 1fr 1fr; }
      .metric.location { grid-column: 1 / -1; }
    }
    @media (max-width: 480px) {
      .wrap { width: min(100% - 20px, 1120px); }
      form { flex-direction: column; }
      button { width: 100%; }
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <h1>오늘 날씨 검색</h1>
      <form id="search-form">
        <input id="location-input" name="location" value="Seoul" placeholder="예: 서울, Busan, Tokyo" autocomplete="off">
        <button id="search-button" type="submit">검색</button>
      </form>
    </div>
  </header>
  <main class="wrap">
    <div id="notice" class="notice" hidden></div>
    <section class="summary" aria-label="날씨 요약">
      <div class="metric location"><span>검색 위치</span><strong id="location">-</strong></div>
      <div class="metric"><span>현재 기온</span><strong id="current-temp">-</strong></div>
      <div class="metric"><span>오늘 최저</span><strong id="min-temp">-</strong></div>
      <div class="metric"><span>오늘 최고</span><strong id="max-temp">-</strong></div>
    </section>
    <section class="panel">
      <div class="panel-header">시간별 기온 그래프</div>
      <div id="chart-slot" class="placeholder">날씨 데이터를 불러오는 중입니다.</div>
    </section>
    <section class="panel">
      <div class="panel-header">시간별 날씨</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>시간</th>
              <th>날씨</th>
              <th>기온</th>
              <th>습도</th>
              <th>강수확률</th>
              <th>강수량</th>
              <th>풍속</th>
            </tr>
          </thead>
          <tbody id="weather-rows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    const form = document.querySelector("#search-form");
    const input = document.querySelector("#location-input");
    const button = document.querySelector("#search-button");
    const notice = document.querySelector("#notice");
    const chartSlot = document.querySelector("#chart-slot");
    const rows = document.querySelector("#weather-rows");

    function formatTemp(value) {
      return `${Number(value).toFixed(1)}°C`;
    }

    function setNotice(message) {
      notice.textContent = message || "";
      notice.hidden = !message;
    }

    function setLoading(isLoading) {
      button.disabled = isLoading;
      button.textContent = isLoading ? "검색 중" : "검색";
      if (isLoading) {
        chartSlot.className = "placeholder";
        chartSlot.textContent = "날씨 데이터를 불러오는 중입니다.";
      }
    }

    function renderWeather(data) {
      document.querySelector("#location").textContent = data.location;
      document.querySelector("#current-temp").textContent = formatTemp(data.current_temperature);
      document.querySelector("#min-temp").textContent = formatTemp(data.min_temperature);
      document.querySelector("#max-temp").textContent = formatTemp(data.max_temperature);

      chartSlot.className = "";
      chartSlot.innerHTML = `<img class="chart" src="${data.chart}" alt="오늘 시간별 기온 그래프">`;

      rows.innerHTML = data.hours.map((hour) => `
        <tr>
          <td>${hour.time}</td>
          <td>${hour.weather}</td>
          <td>${formatTemp(hour.temperature)}</td>
          <td>${hour.humidity}%</td>
          <td>${hour.precipitation_probability}%</td>
          <td>${Number(hour.precipitation).toFixed(1)}mm</td>
          <td>${Number(hour.wind_speed).toFixed(1)}km/h</td>
        </tr>
      `).join("");
    }

    async function loadWeather(location) {
      setNotice("");
      setLoading(true);
      try {
        const response = await fetch(`/api/weather?location=${encodeURIComponent(location)}`);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "날씨 데이터를 불러오지 못했습니다.");
        }
        renderWeather(data);
      } catch (error) {
        chartSlot.className = "placeholder";
        chartSlot.textContent = "그래프를 표시할 수 없습니다.";
        rows.innerHTML = "";
        setNotice(error.message);
      } finally {
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const location = input.value.trim() || "Seoul";
      input.value = location;
      loadWeather(location);
    });

    loadWeather(input.value);
  </script>
</body>
</html>
